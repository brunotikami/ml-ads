name: Deploy to Vercel + GitHub Pages Cache Invalidation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Deploy to Vercel
        run: vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      
      - name: Invalidate GitHub Pages cache
        run: |
          # Touch arquivo para forçar rebuild
          touch .cache-invalidate
          git add .cache-invalidate
          git commit -m "chore: invalidate cache"
          git push origin main
